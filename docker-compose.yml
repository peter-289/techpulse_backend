services:
  db:
    image: postgres:latest
    container_name: techpulse-db
    
    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  pgadmin:
     image: elestio/pgadmin
     container_name: pgadmin
     restart: always
     environment:
       PGADMIN_DEFAULT_EMAIL: admin@gmail.com
       PGADMIN_DEFAULT_PASSWORD: MwakiPeter@289
     ports:
       - "5050:80"
     depends_on:
       - db
     volumes:
       - pgadmin_data:/var/lib/pgadmin
  
  redis:
     image: redis
     container_name: techpulse-redis
     command: >
       redis-server
       --requirepass ${REDIS_PASSWORD}

     env_file:
       - .env

     ports:
       - "6379:6379"
      
     volumes:
        - redis_data:/data
  mailhog:
     image: mailhog/mailhog:latest
     container_name: mailhog
     restart: unless-stopped
     ports:
       - "1025:1025"
       - "8025:8025"
      
volumes:
 postgres_data:
 pgadmin_data:
 redis_data:



